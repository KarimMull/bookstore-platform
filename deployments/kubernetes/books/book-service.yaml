apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: book-service

  template:
    metadata:
      labels:
        app: book-service

    spec:
      containers:
        - name: book-service
          image: book-service:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8081

          # ПОЛНЫЕ ENV ДЛЯ POSTGRES
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_NAME
              value: bookstore

          # HEALTH CHECK (liveness)
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5

          # READINESS CHECK
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5

          # ресурсы (важно для стабильности)
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: book-service

spec:
  selector:
    app: book-service

  ports:
    - port: 8081
      targetPort: 8081